<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>APEX Idea Generator</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-3xl font-bold mb-6 text-center">APEX Niche Idea Generator</h1><p class="mb-4 text-center text-gray-600">Unlock hyper-specific content ideas.</p><form id="ideaForm" class="space-y-4"><input type="text" id="niche" placeholder="Your Niche (e.g., 'dog groomers NYC')" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required><input type="text" id="topic" placeholder="Content Type (e.g., 'blog posts', 'YouTube videos')" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required><button type="submit" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">Generate Ideas</button></form><div id="results" class="mt-6 p-4 bg-gray-50 rounded hidden"><h2 class="text-xl font-semibold mb-3">Your Ideas:</h2><ul class="list-disc pl-5" id="ideaList"></ul></div><p class="text-center mt-6 text-sm text-gray-500">Access limited. Unlock full ideas for $9.99.</p></div><script>(async()=>{const e=document.getElementById("ideaForm"),t=document.getElementById("niche"),n=document.getElementById("topic"),i=document.getElementById("results"),l=document.getElementById("ideaList");e.addEventListener("submit",async c=>{c.preventDefault();const d=t.value,s=n.value;l.innerHTML="<li class='text-gray-500'>Generating ideas...</li>";i.classList.remove("hidden");const o=await fetch("/api/generate-ideas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({niche:d,topic:s})});if(o.ok){const{ideas:e}=await o.json();l.innerHTML="";e.forEach(e=>{const t=document.createElement("li");t.textContent=e,l.appendChild(t)})}else l.innerHTML="<li class='text-red-500'>Error generating ideas. Please try again.</li>"})})();</script></body></html>
