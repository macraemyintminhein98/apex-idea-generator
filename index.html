<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex Idea Generator</title><style>body{font-family:sans-serif;margin:2em;text-align:center;background:#0d1117;color:#c9d1d9}h1{color:#58a6ff}p{max-width:600px;margin:1em auto}input,button{padding:0.8em;margin:0.5em;border-radius:5px;border:1px solid #30363d}input{background:#0d1117;color:#c9d1d9}button{background:#238636;color:white;cursor:pointer}button:hover{background:#2ea043}.output{background:#161b22;padding:1em;margin:1em auto;border-radius:5px;text-align:left;max-width:600px;min-height:100px;white-space:pre-wrap}</style></head><body><h1>Apex Idea Generator</h1><p>Unleash your creativity. Generate unique content ideas for blogs, tweets, and videos.</p><label for="keywords">Keywords:</label><input type="text" id="keywords" placeholder="e.g., AI, marketing, productivity"><label for="tone">Tone:</label><input type="text" id="tone" placeholder="e.g., witty, informative, casual"><button onclick="generateIdeas()">Generate Ideas</button><div class="output" id="output"></div><script>async function generateIdeas(){const keywords=document.getElementById('keywords').value;const tone=document.getElementById('tone').value;const outputDiv=document.getElementById('output');outputDiv.textContent="Generating ideas...";try{const response=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,tone})});if(!response.ok)throw new Error(`HTTP error! status: ${response.status}`);const data=await response.json();outputDiv.textContent=data.ideas;}catch(error){outputDiv.textContent=`Error: ${error.message}. Please try again.`}}</script></body></html>
